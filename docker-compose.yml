services:
  mysql:
    image: mysql:8.4
    container_name: jpa-lesson-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: jpa_lesson
      MYSQL_USER: jpa
      MYSQL_PASSWORD: jpa
    volumes:
      - jpa-lesson-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  jpa-lesson-mysql-data:
